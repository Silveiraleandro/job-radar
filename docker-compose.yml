services:
  postgres:
    image: postgres:16
    container_name: job-radar-postgres
    environment:
      POSTGRES_DB: jobradar
      POSTGRES_USER: jobradar
      POSTGRES_PASSWORD: jobradar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: